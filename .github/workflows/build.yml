name: build Grad Linux™

on:
    pull_request:
        branches: main
    push:
        branches: main

permissions:
    packages: write
    contents: read

env:
    PUSHERS: '["RixInGithub"]'

jobs:
    build:
        name: build everything
        runs-on: ubuntu-latest
        container: ghcr.io/gradnux/builder:latest
        steps:
            - name: check out
              uses: actions/checkout@v4
              with:
                  lfs: true
            - name: install prerequisites
              run: |
                  # kernel
                  sudo apt install -y ccache flex bison libncurses-dev libssl-dev libelf-dev
                  # aria2c
                  # sudo apt install -y libxml2-dev autoconf automake autotools-dev autopoint libtool libssl-dev zlib1g-dev libsqlite3-dev libxml2-dev liblzma-dev libssl3
            - name: setup ccache
              uses: actions/cache@v4
              with:
                  path: |
                      kernel
                      .git/modules/kernel
                  key: build-ccache-${{ runner.os }}
                  restore-keys: build-ccache-${{ runner.os }}
            - name: setup
              run: |
                  cd rootfs
                  mkdir -p dev etc lib lib64 proc sbin sys usr tmp bin
                  cd ..
                  mkdir -p busybox ~/bb
                  aria2c -j 16 -x 16 -s 16 "https://busybox.net/downloads/busybox-1.38.0.tar.bz2" -o bb.tar.bz2
                  tar -xf bb.tar.bz2 -C busybox --strip-components=1
                  git config --global --add safe.directory '*'
                  git submodule init
                  git submodule update --init --depth 1 kernel
                  git submodule update --init --recursive
                  # sudo apt install -y tree
                  # tree rootfs
            - name: build kernel (stub)
              run: |
                  ccache --max-size 10G
                  # CC="ccache gcc" HOSTCC="ccache gcc" ./buildKernel
                  # not now apparently
                  # let's not waste microsoft's resources (for now... heh heh...)
            - name: obtain musl
              run: |
                  cp -r /musl/. rootfs/usr
                  rm rootfs/usr/bin/musl-gcc rootfs/lib/musl-gcc.specs || true
            - name: obtain rust
              run: |
                  mkdir -p rootfs/tmp/rust rootfs/usr/local
                  tar -xf rust.tar.gz -C rootfs/tmp/rust --strip-components=1
            - name: build tcc
              run: |
                  cd tcc
                  rm lib/bcheck.c
                  touch lib/bcheck.c
                  CFLAGS="--sysroot=/musl" ./configure --cc="musl-gcc -static" --prefix="/usr" --exec-prefix="/" --sysincludepaths="/usr/include" --crtprefix="/lib" --elfinterp="/lib/libc.so" --enable-static --config-bcheck=no
                  sudo mv /usr/include "$HOME"/glibcWompWomp
                  sudo cp -r /musl/include /usr/include
                  # gaslight tcc into believing musl is here
                  make CC="musl-gcc" CFLAGS="-static --sysroot=/musl" LDFLAGS="-static" CONFIG_bcheck=no -j$(nproc)
                  sudo rm -rf /usr/include
                  sudo mv "$HOME"/glibcWompWomp /usr/include
                  # glibc needs to get back here, unfortunately
                  ls -la ../rootfs
                  ls -la ../rootfs/bin
                  chmod +x ./tcc
                  mv ./tcc ../rootfs/bin/
                  mv ./libtcc1.a ../rootfs/lib/
                  cp -rf include/. ../rootfs/usr/include/
                  cd ..
            - name: build busybox
              run: |
                  ./setupBb
                  cd busybox
                  make oldconfig
                  MUSLCC="musl-gcc -static --sysroot=/musl"
                  CC="$MUSLCC" HOSTCC="$MUSLCC" CFLAGS="-static" LDFLAGS="-static" make -j$(nproc)
                  make CONFIG_PREFIX="$HOME/bb" install
                  mkdir -p ../rootfs/usr/share/man/man1/
                  cp docs/busybox.1 ../rootfs/usr/share/man/man1/busybox.1
                  cd ..
                  # "You will probably need to make your busybox binary setuid root to ensure all configured applets will work properly."
                  sudo chown root ~/bb/bin/busybox
                  sudo chmod 4755 ~/bb/bin/busybox
                  cp -a ~/bb/bin/busybox rootfs/bin/
                  for a in $(find ~/bb -type l -printf "%f " | sed "s/ *$//"); do
                      ln -sT busybox "rootfs/bin/$a"
                  done
            - name: build final image?
              run: |
                  chmod 1777 rootfs/tmp
                  podman build -t gradnux:latest .
                  podman save -o gradnux.tar ${{ github.event.repository.name }}:latest
            - name: upload state
              uses: actions/upload-artifact@v4
              with:
                  name: img
                  path: "${{ github.event.repository.name }}.tar"
            - name: login to ghcr
              uses: docker/login-action@v4
              if: github.event_name == 'push' && contains(fromJSON(env.PUSHERS), github.actor)
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: push to ghcr
              uses: redhat-actions/push-to-registry@v2
              if: github.event_name == 'push' && contains(fromJSON(env.PUSHERS), github.actor)
              with:
                  registry: "ghcr.io/${{ github.repository_owner }}"
                  image: "${{ github.event.repository.name }}"
                  tags: latest
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}