name: build Grad Linux™

on:
    pull_request:
        branches: main
    push:
        branches: main

env:
    PUSHERS: ${{ toJSON(["RixInGithub"]) }}

jobs:
    build:
        name: build everything
        runs-on: ubuntu-latest
        steps:
            - name: check out
              uses: actions/checkout@v4
            - name: install prerequisites
              run: |
                  sudo apt update -y
                  # host helpers
                  sudo apt install -y build-essential gcc aria2 texinfo perl
                  # kernel
                  sudo apt install -y ccache flex bison libncurses-dev libssl-dev libelf-dev
            - name: setup ccache
              uses: actions/cache@v4
              with:
                  path: |
                      kernel
                      .git/modules/kernel
                  key: build-ccache-${{ runner.os }}
                  restore-keys: build-ccache-${{ runner.os }}
            - name: setup
              run: |
                  cd rootfs
                  mkdir -p {dev,etc,lib,lib64,proc,sbin,sys,usr,tmp,bin}
                  cd ..
                  mkdir -p {musl,busybox} ~/musl/
                  aria2c -j 16 -x 16 -s 16 "https://musl.libc.org/releases/musl-1.2.6.tar.gz" -o musl.tar.gz
                  tar -xf musl.tar.gz -C musl --strip-components=1
                  aria2c -j 16 -x 16 -s 16 "https://busybox.net/downloads/busybox-1.38.0.tar.bz2" -o bb.tar.bz2
                  tar -xf bb.tar.bz2 -C busybox --strip-components=1
                  git submodule init
                  git submodule update --init --depth 1 kernel
                  git submodule update --init --recursive
                  mv scavenge rootfs/tmp/scavenge
            - name: build kernel (stub)
              run: |
                  ccache --max-size 10G
                  # CC="ccache gcc" HOSTCC="ccache gcc" ./buildKernel
                  # not now apparently
                  # let's not waste microsoft's resources (for now... haha...)
            - name: build musl
              run: |
                  cd musl
                  CC=gcc AR=ar RANLIB=ranlib ./configure --prefix="$HOME"/musl/ --target=x86_64-linux-musl –enable-optimize=size
                  # "started with gcc 4.8.1, the memset code will be miscompiled. This can be worked around by adding -fno-tree-loop-distribute-patterns to the CFLAGS or passing –enable-optimize=size to configure."
                  make -j$(nproc)
                  sudo make install
                  # mmh, sudo
                  cd ..
                  cp -r ~/musl/. rootfs/usr
                  rm rootfs/usr/bin/musl-gcc || true
                  echo "$HOME/musl/bin" >> $GITHUB_PATH
                  echo "$LD_LIBRARY_PATH"
                  echo "LD_LIBRARY_PATH=$HOME/musl/lib" >> $GITHUB_ENV
                  echo "CC=$HOME/musl/bin/musl-gcc" >> $GITHUB_ENV
            - name: build tcc
              run: |
                  cd tcc
                  rm lib/bcheck.c
                  touch lib/bcheck.c
                  CFLAGS="--sysroot=$HOME/musl" ./configure --cc="musl-gcc -static" --prefix="/usr" --exec-prefix="/" --sysincludepaths="/usr/include" --crtprefix="/lib" --elfinterp="/lib/libc.so" --enable-static --config-bcheck=no
                  sudo mv /usr/include "$HOME"/glibcWompWomp
                  sudo cp -r ~/musl/include /usr/include
                  # gaslight tcc into believing musl is here
                  make CC="musl-gcc" CFLAGS="-static --sysroot=$HOME/musl" LDFLAGS="-static" CONFIG_bcheck=no -j$(nproc)
                  sudo rm -rf /usr/include
                  sudo mv "$HOME"/glibcWompWomp /usr/include
                  # glibc needs to get back here, unfortunately
                  chmod +x ./tcc
                  mv ./tcc ../rootfs/usr/bin/
                  mv ./libtcc1.a ../rootfs/usr/lib/
                  cp -rf include/. ../rootfs/usr/include/
                  cd ..
            - name: build busybox
              run: |
                  ./setupBb
                  cd busybox
                  make oldconfig
                  MUSLCC="musl-gcc -static --sysroot=$HOME/musl"
                  CC="$MUSLCC" HOSTCC="$MUSLCC" CFLAGS="-static" LDFLAGS="-static" make -j$(nproc)
                  make CONFIG_PREFIX="$HOME/bb" install
                  mkdir -p ../rootfs/usr/share/man/man1/
                  cp docs/busybox.1 ../rootfs/usr/share/man/man1/busybox.1
                  cd ..
                  # "You will probably need to make your busybox binary setuid root to ensure all configured applets will work properly."
                  sudo chown root ~/bb/bin/busybox
                  sudo chmod 4755 ~/bb/bin/busybox
                  cp -a ~/bb/bin/busybox rootfs/bin/
                  for a in $(find ~/bb -type l -printf "%f " | sed "s/ *$//"); do
                      ln -sT busybox "rootfs/bin/$a"
                  done
            - name: build final image?
              run: |
                  cd rootfs
                  chmod 1777 tmp
                  for a in {bin,lib}; do
                      cp -r usr/"$a"/. "$a"
                      rm -rf usr/"$a"
                      ln -sT ../../"$a" usr/"$a"
                  done
                  cd ..
                  # lets use sudo for safety measures
                  sudo podman build -t gradnuxbase:latest .
                  sudo podman run -dit --name container gradnuxbase:latest
                  sudo podman exec container tcc -v
                  sudo podman exec container sh -c "cd /tmp/scavenge && ./build.sh && cp ./scavenge /bin/ && cd / && rm -rf /tmp/scavenge"
                  sudo podman commit container gradnux:latest
                  sudo podman save -o gradnux.tar gradnux:latest
            - name: upload state
              uses: actions/upload-artifact@v4
              with:
                  name: gradnuxImg
                  path: gradnux.tar
            - name: login to ghcr
              uses: docker/login-action@v4
              if: github.event_name == 'push' && contains(fromJSON(env.PUSHERS), github.actor)
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: push to ghcr
              uses: redhat-actions/push-to-registry@v2
              if: github.event_name == 'push' && contains(fromJSON(env.PUSHERS), github.actor)
              with:
                  registry: "ghcr.io/${{ github.actor }}"
                  image: "${{ github.event.repository.name }}"
                  tags: latest
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }} 