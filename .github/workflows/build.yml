name: build Grad Linux™

on: push

jobs:
    build:
        name: build everything
        runs-on: ubuntu-latest
        steps:
            - name: check out
              uses: actions/checkout@v4
            - name: install prerequisites
              run: |
                  sudo apt update -y
                  # host helpers
                  sudo apt install -y build-essential gcc aria2
                  # kernel
                  sudo apt install -y ccache flex bison libncurses-dev libssl-dev libelf-dev
                  # aria2c
                  sudo apt install -y libxml2-dev libcppunit-dev autoconf automake autotools-dev autopoint libtool libssl-dev zlib1g-dev libsqlite3-dev libxml2-dev liblzma-dev libssl3
            - name: setup ccache
              uses: actions/cache@v4
              with:
                  path: |
                      kernel
                      .git/modules/kernel
                  key: kernel-ccache
                  restore-keys: kernel-ccache
            - name: setup
              run: |
                  mkdir -p {musl,busybox} rootfs/opt/bin rootfs/usr
                  aria2c -j 16 -x 16 -s 16 "https://musl.libc.org/releases/musl-1.2.6.tar.gz" -o musl.tar.gz
                  tar -xf musl.tar.gz -C musl --strip-components=1
                  aria2c -j 16 -x 16 -s 16 "https://busybox.net/downloads/busybox-1.38.0.tar.bz2" -o bb.tar.bz2
                  tar -xf bb.tar.bz2 -C busybox --strip-components=1
                  # aria2c -j 16 -x 16 -s 16 "https://ftp.gnu.org/gnu/binutils/binutils-with-gold-2.46.tar.gz" -o binutils.tar.bz2
                  # if this dl is slow on my pc even with aria2c, it would prob be slow on gh actions runners
                  # tar -xf binutils.tar.gz -C binutils --strip-components=1
                  # echo "yarrrr i struck GÖLD!!!!"
                  # yes i got the binutils with gold
                  git submodule update --init --recursive --depth 1
            - name: build kernel (stub)
              run: |
                  ccache --max-size 10G
                  # CC="ccache gcc" HOSTCC="ccache gcc" ./buildKernel
                  # not now apparently
                  # let's not waste microsoft's resources (for now... haha...)
            - name: build musl
              run: |
                  cd musl
                  CC=gcc AR=ar RANLIB=ranlib ./configure --prefix=/opt/musl --target=x86_64-linux-musl –enable-optimize=size
                  # "started with gcc 4.8.1, the memset code will be miscompiled. This can be worked around by adding -fno-tree-loop-distribute-patterns to the CFLAGS or passing –enable-optimize=size to configure."
                  make -j$(nproc)
                  sudo make install
                  # mmh, sudo
                  cd ..
                  # sed -i /opt/musl/include/bits/alltypes.h -e "s/^.*__builtin_va_list/\/\/ nope/g"
                  cp -a /opt/musl rootfs/opt/musl
                  rm -rf rootfs/opt/musl/bin
                  echo "/opt/musl/bin/" >> $GITHUB_PATH
                  # cp /lib/ld-musl-x86_64.so.1 rootfs/lib/
                  tree /opt/musl
            # binutils is useless for tcc as tcc does everything itself. :)
            # - name: build binutils
            #   run: |
            #       cd binutils
            #       ./configure --prefix=/opt/binutils --disable-nls --disable-werror --disable-multilib --enable-gold --enable-static --disable-shared LDFLAGS="-static -static-libgcc"
            #       make configure-host
            #       CC=/opt/musl/bin/musl-gcc CXX=/opt/musl/bin/musl-g++ AR=/opt/musl/bin/musl-ar make -j$(nproc) LDFLAGS="--static"
            #       make DESTDIR="$(realpath ./install)" install
            #       file install/opt/binutils/bin/as
            #       cp -L install/opt/binutils/bin/as ../rootfs/opt/bin/
            #       cp -L install/opt/binutils/bin/ld ../rootfs/opt/bin/
            #       cd ..
            - name: build tcc
              run: |
                  cd tcc
                  rm lib/bcheck.c
                  touch lib/bcheck.c
                  # brute force turn off bcheck (hopefully this works?)
                  ./configure --cc=/opt/musl/bin/musl-gcc --prefix=/opt/tcc --libdir=/opt/tcc/lib --crtprefix=/opt/musl/lib --sysincludepaths=/opt/musl/include --enable-static --config-bcheck=no
                  make CC=/opt/musl/bin/musl-gcc CFLAGS="-static" LDFLAGS="-static" CONFIG_bcheck=no tcc libtcc1.a
                  chmod +x ./tcc
                  mkdir -p ../rootfs/opt/tcc
                  mkdir -p ../rootfs/opt/tcc/lib/tcc
                  mv ./tcc ../rootfs/opt/tcc/
                  mv ./libtcc1.a ../rootfs/opt/tcc/lib/tcc/
                  mv include ../rootfs/opt/tcc/lib/tcc/
                  cd ..
            - name: build busybox
              run: |
                  ./setupBb
                  cd busybox
                  make oldconfig
                  CC=musl-gcc CFLAGS="-static" LDFLAGS="-static" make -j$(nproc)
                  make CONFIG_PREFIX="$HOME/bb" install
                  cp -a ~/bb/bin/busybox ../rootfs/opt/bin/
                  # just to make sure busybox is there and all
                  cd ..
                  for a in $(find ~/bb -type l -printf "%f " | sed "s/ *$//"); do
                      ln -sT busybox "rootfs/opt/bin/$a"
                  done
                  file rootfs/opt/bin/busybox
                  ls -la rootfs/opt/bin
            - name: build aria2c
              run: |
                  cd aria2c
                  autoreconf -i
                  ./configure ARIA2_STATIC=yes CC=musl-gcc
                  CC=musl-gcc CFLAGS="-static" LDFLAGS="-static" make -j$(nproc)
                  mv src/aria2c ../rootfs/opt/bin/
                  cd ..
                  mkdir -p rootfs/usr/lib/x86_64-linux-gnu/ossl-modules
                  cp /usr/lib/x86_64-linux-gnu/ossl-modules/legacy.so rootfs/usr/lib/x86_64-linux-gnu/ossl-modules/
            - name: build final image?
              run: |
                  cd rootfs
                  mkdir -p {dev,etc,lib,lib64,proc,sbin,sys,usr,tmp}
                  chmod 1777 tmp
                  rm -rf bin
                  ln -sT ../opt/bin ./bin
                  cd ..
                  podman build -t gradnux:latest .
                  podman save -o gradnux.tar gradnux:latest
            - name: upload image
              uses: actions/upload-artifact@v4
              with:
                  name: gradnuxImg
                  path: ./gradnux.tar