name: build Grad Linux™

on: push

jobs:
    build:
        name: build the image ig
        runs-on: ubuntu-latest
        steps:
            - name: check out
              uses: actions/checkout@v4
            - name: install prerequisites
              run: |
                  sudo apt update -y
                  # host helpers
                  sudo apt install -y build-essential musl-tools aria2
                  # kernel
                  sudo apt install -y ccache build-essential flex bison libncurses-dev libssl-dev libelf-dev
            - name: setup ccache
              uses: actions/cache@v4
              with:
                  path: ./kernel
                  key: kernel-ccache
                  restore-keys: kernel-ccache
            - name: build kernel
              run: |
                  ccache --max-size 10G
                  # git submodule update --init --recursive --depth 1
                  # CC="ccache gcc" HOSTCC="ccache gcc" ./buildKernel
                  # not now apparently
            - name: attempt?
              run: |
                  aria2c -j 16 -x 16 -s 16 "https://musl.libc.org/releases/musl-1.2.5.tar.gz"
                  tar -xf musl-1.2.5.tar.gz
                  cd musl-1.2.5
                  ./configure --prefix=/opt/musl --target=x86_64-linux-musl
                  make -j$(nproc)
                  make install
                  cp -r /opt/musl rootfs/opt/
                  ls -la rootfs/opt
                  podman save -o gradnux.tar gradnux:latest
            - name: upload image
              uses: actions/upload-artifact@v4
              with:
                  name: gradnuxImg
                  path: ./gradnux.tar