name: build Grad Linux™

on: push

jobs:
    build:
        name: build the image ig
        runs-on: ubuntu-latest
        steps:
            - name: check out
              uses: actions/checkout@v4
            - name: install prerequisites
              run: |
                  sudo apt update -y
                  # host helpers
                  sudo apt install -y tcc
                  # bootc?
                  sudo apt install -y podman go-md2man
                  mkdir -p ~/tmp/{rust,bootc}
                  "CARGO_HOME=$HOME/tmp/rust" >> $GITHUB_ENV
                  "RUSTUP_HOME=$HOME/tmp/rust" >> $GITHUB_ENV
                  curl -sSf "https://sh.rustup.rs" | sh -s -- --profile minimal -y
                  source "$RUSTUP_HOME"
                  "$RUSTUP_HOME" >> $GITHUB_PATH
                  git clone "https://github.com/bootc-dev/bootc.git"
                  cd bootc
                  "BOOTC_HOME=$HOME/tmp/bootc"
                  make bin install-all DESTDIR="$BOOTC_HOME"
                  source 
                  "$BOOTC_HOME" >> $GITHUB_PATH
                  cd ..
                  # kernel
                  sudo apt install -y ccache build-essential flex bison libncurses-dev libssl-dev libelf-dev
            - name: setup ccache
              uses: actions/cache@v4
              with:
                  path: ./kernel
                  key: kernel-ccache
                  restore-keys: kernel-ccache
            - name: build kernel
              run: |
                  ccache --max-size 10G
                  git submodule update --init --recursive --depth 1
                  CC="ccache gcc" HOSTCC="ccache gcc" ./buildKernel
            - name: attempt?
              run: |
                  git clone "https://github.com/bootc-dev/bootc.git"
                  make -C
                  podman build -t gradnux:latest -f Containerfile .
                  # idfk