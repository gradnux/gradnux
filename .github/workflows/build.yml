name: build Grad Linux™

on: push

jobs:
    build:
        name: build the image ig
        runs-on: ubuntu-latest
        steps:
            - name: check out
              uses: actions/checkout@v4
            - name: install prerequisites
              run: |
                  sudo apt update -y
                  # host helpers
                  sudo apt install -y tcc
                  # bootc?
                  sudo apt install -y podman go-md2man libglib2.0-dev pkg-config
                  mkdir -p ~/tmp/{rust,bootc}
                  echo "CARGO_HOME=$HOME/tmp/rust" >> $GITHUB_ENV
                  echo "RUSTUP_HOME=$HOME/tmp/rust" >> $GITHUB_ENV
                  curl -sSf "https://sh.rustup.rs" | sh -s -- --profile minimal -y
                  . "$HOME/.cargo/env"
                  echo "$RUSTUP_HOME" >> $GITHUB_PATH
                  # ostree {
                  git clone https://github.com/ostreedev/ostree.git ostree
                  cd ostree
                  git submodule update --init --recursive
                  env NOCONFIGURE=1 ./autogen.sh
                  ./configure --prefix=/usr --sysconfdir=/etc --libdir=/usr/lib --mandir=/usr/share/man --infodir=/usr/share/info --localstatedir=/var --disable-silent-rules --disable-gtk-doc --with-curl --with-openssl --without-soup --with-dracut=yesbutnoconf
                  make
                  make DESTDIR=/build-directory install
                  # } ostree
                  git clone "https://github.com/bootc-dev/bootc.git"
                  cd bootc
                  echo "BOOTC_HOME=$HOME/tmp/bootc" >> $GITHUB_ENV
                  make bin install-all DESTDIR="$BOOTC_HOME"
                  echo "$BOOTC_HOME" >> $GITHUB_PATH
                  cd ..
                  # kernel
                  sudo apt install -y ccache build-essential flex bison libncurses-dev libssl-dev libelf-dev
            - name: setup ccache
              uses: actions/cache@v4
              with:
                  path: ./kernel
                  key: kernel-ccache
                  restore-keys: kernel-ccache
            - name: build kernel
              run: |
                  ccache --max-size 10G
                  git submodule update --init --recursive --depth 1
                  CC="ccache gcc" HOSTCC="ccache gcc" ./buildKernel
            - name: attempt?
              run: |
                  git clone "https://github.com/bootc-dev/bootc.git"
                  make -C
                  podman build -t gradnux:latest -f Containerfile .
                  # idfk