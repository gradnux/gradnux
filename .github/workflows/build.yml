name: build Grad Linux™

on: push

jobs:
    build:
        name: build everything
        runs-on: ubuntu-latest
        steps:
            - name: check out
              uses: actions/checkout@v4
            - name: install prerequisites
              run: |
                  sudo apt update -y
                  # host helpers
                  sudo apt install -y build-essential gcc aria2
                  # kernel
                  sudo apt install -y ccache build-essential flex bison libncurses-dev libssl-dev libelf-dev
            - name: setup
              run: |
                  mkdir -p {musl,busybox,binutils} rootfs/opt
                  aria2c -j 16 -x 16 -s 16 "https://musl.libc.org/releases/musl-1.2.2.tar.gz" -o musl.tar.gz
                  tar -xf musl.tar.gz -C musl --strip-components=1
                  aria2c -j 16 -x 16 -s 16 "https://busybox.net/downloads/busybox-1.38.0.tar.bz2" -o bb.tar.bz2
                  tar -xf bb.tar.bz2 -C busybox --strip-components=1
                  # aria2c -j 16 -x 16 -s 16 "https://ftp.gnu.org/gnu/binutils/binutils-with-gold-2.46.tar.gz" -o binutils.tar.bz2
                  # if this dl is slow on my pc even with aria2c, it would prob be slow on gh actions runners
                  tar -xf binutils.tar.gz -C binutils --strip-components=1
                  echo "yarrrr i struck GÖLD!!!!"
                  # yes i got the binutils with gold
                  git submodule update --init --recursive --depth 1
            - name: setup ccache
              uses: actions/cache@v4
              with:
                  path: ./kernel
                  key: kernel-ccache
                  restore-keys: kernel-ccache
            - name: build kernel (stub)
              run: |
                  ccache --max-size 10G
                  # CC="ccache gcc" HOSTCC="ccache gcc" ./buildKernel
                  # not now apparently
                  # let's not waste microsoft's resources (for now... haha...)
            - name: build musl
              run: |
                  cd musl
                  CC=gcc AR=ar RANLIB=ranlib ./configure --prefix=/opt/musl --target=x86_64-linux-musl
                  make -j$(nproc)
                  make install
                  cd ..
                  cp -r /opt/musl/* rootfs/opt
                  echo "/opt/musl/bin/" >> $GITHUB_PATH
            - name: build binutils
              run: |
                  cd binutils
                  ./configure --prefix=/opt/binutils --disable-nls --disable-werror --disable-multilib --enable-gold --enable-static --disable-shared
                  CC=/opt/musl/bin/musl-gcc LDFLAGS="-static" make -j$(nproc)
                  make DESTDIR="$(realpath ./install)" install
                  cp -L install/opt/binutils/bin/as ../rootfs/opt/bin/
                  cp -L install/opt/binutils/bin/ld ../rootfs/opt/bin/
                  cd ..
            - name: build chibicc
              run: |
                  cd chibicc
                  CC=/opt/musl/bin/musl-gcc LDFLAGS="-static" make chibicc
                  chmod +x ./chibicc
                  mv ./chibicc ../rootfs/opt/bin
                  cd ..
            - name: build busybox
              run: |
                  cd busybox
                  make defconfig
                  sed -E -i "s/CONFIG_TC=[ynm]/CONFIG_TC=n/" .config
                  sed -E -i "s/CONFIG_STATIC=[ynm]/CONFIG_STATIC=y/" .config
                  CC=/opt/musl/bin/musl-gcc CFLAGS="-static" LDFLAGS="--static" make -j$(nproc)
                  make CONFIG_PREFIX="$HOME/bb" install
                  cp -a ~/bb/bin/busybox ../rootfs/opt/bin/
                  # just to make sure busybox is there and all
                  cp -a ~/bb/bin/* ../rootfs/opt/bin/
                  cd ..
            - name: build final image?
              run: |
                  cd rootfs
                  mkdir -p {bin,dev,etc,lib,lib64,proc,sbin,sys,usr,tmp}
                  chmod 1777 tmp
                  ln -s ../opt/bin/busybox bin/sh
                  tree > /tmp/out 2>&1 && cat /tmp/out
                  rm /tmp/out
                  cd ..
                  podman build -t gradnux:latest .
                  podman save -o gradnux.tar gradnux:latest
            - name: upload image
              uses: actions/upload-artifact@v4
              with:
                  name: gradnuxImg
                  path: ./gradnux.tar